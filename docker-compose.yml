services:
  db:
    image: postgres:18-alpine
    # Memory settings sized for the db CONTAINER budget (mem_limit below), NOT
    # the 16 GB host. Earlier tuning used host-sized values (shared_buffers=4GB,
    # effective_cache_size=12GB) which left only ~6 GB of the 10 GB cgroup cap
    # for per-backend work and triggered another Postgres OOM-kill on 2026-05-26
    # during a concurrent dual-platform import for user 109. Lowering
    # shared_buffers + raising the cap restores headroom. effective_cache_size
    # must be <= what the container can actually access. work_mem bounded by
    # max_connections=30 x 16MB = ~480MB worst case. maintenance_work_mem
    # applies per autovacuum worker (default autovacuum_max_workers=3) so peak
    # from vacuum is ~1.5 GB.
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "effective_cache_size=8GB"
      - "-c"
      # Cap at 30 to match the application pool (10 + 10 per uvicorn process,
      # see app/core/database.py) plus headroom for psql, migrations, and
      # monitoring. The Postgres default of 100 was the upstream cause of the
      # 2026-05-21 OOM: each backend reserves per-connection structures and
      # work_mem ceiling, so an unbounded pool grew Postgres past host RAM.
      - "max_connections=30"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    # memswap_limit = mem_limit disables swap for the db cgroup. Postgres
    # paged out to swap is catastrophic for latency anyway; better to get a
    # contained OOM-kill (~3 s auto-recovery, as observed on 2026-05-20 and
    # 2026-05-21) than tens of seconds of swap thrash dragging down the host.
    mem_limit: 12g
    memswap_limit: 12g
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Pin PGDATA to the conventional path. The postgres:18 image defaults to
      # /var/lib/postgresql/18/docker, which would NOT be on the named volume
      # below, so data would silently live in the container's writable layer
      # and be lost on `docker compose down`. Keep this aligned with the volume
      # mount path.
      PGDATA: /var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build: .
    env_file: .env
    environment:
      # Number of long-lived Stockfish UCI processes shared across the API.
      # Workers run under Linux SCHED_IDLE (see app/services/engine.py), so
      # they only consume idle CPU and never preempt Uvicorn / Postgres. That
      # makes pool size = vCPU count safe; default 4 matches the prod box.
      # Override via .env (STOCKFISH_POOL_SIZE) on hosts with different CPU.
      STOCKFISH_POOL_SIZE: ${STOCKFISH_POOL_SIZE:-4}
    expose:
      - "8000"
    # memswap_limit = mem_limit disables swap for the backend cgroup, so a
    # runaway uvicorn + Stockfish footprint gets OOM-killed inside the
    # container (auto-restarts) instead of dragging the host into the swap
    # thrash that preceded the 2026-05-20 and 2026-05-21 Postgres OOM-kills.
    # Phase 116 / QUEUE-07 memory accounting (measured 2026-06-12):
    #   8 workers x ~368 MB (conservative Phase 91 prod baseline) = ~2.94 GB
    #   FastAPI/Uvicorn + import pipeline                         = ~0.30 GB
    #   Total estimate                                            = ~3.24 GB
    #   Headroom under 4g                                         = ~0.76 GB
    # Dev measurement at 1M-node budget: 1w=277MB, 8w=2083MB(260MB/w).
    # NNUE net is OS page-cache-shared, so N-worker total is sub-linear.
    # Current prod pool: STOCKFISH_POOL_SIZE=6 (stable for several weeks).
    # Phase 116 target: 8, contingent on prod soak confirming the ~0.76 GB
    # headroom holds and API latency is clean (D-116-13). Deploy at 6 first.
    mem_limit: 4g
    memswap_limit: 4g
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER}:${UMAMI_DB_PASSWORD}@db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      NODE_OPTIONS: "--max-old-space-size=256"
    expose:
      - "3000"
    mem_limit: 384m
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_SENTRY_DSN=${VITE_SENTRY_DSN}
        - VITE_SENTRY_TRACES_SAMPLE_RATE=${VITE_SENTRY_TRACES_SAMPLE_RATE}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - umami
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
