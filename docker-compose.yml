services:
  db:
    image: postgres:18-alpine
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Pin PGDATA to the conventional path. The postgres:18 image defaults to
      # /var/lib/postgresql/18/docker, which would NOT be on the named volume
      # below, so data would silently live in the container's writable layer
      # and be lost on `docker compose down`. Keep this aligned with the volume
      # mount path.
      PGDATA: /var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build: .
    env_file: .env
    environment:
      # Number of long-lived Stockfish UCI processes shared across the API.
      # 2 of 4 vCPUs lets import-time eval fan-out parallelise across workers
      # while leaving headroom for Postgres + Uvicorn under live traffic.
      # Override via .env (STOCKFISH_POOL_SIZE) on hosts with different CPU.
      STOCKFISH_POOL_SIZE: ${STOCKFISH_POOL_SIZE:-2}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER}:${UMAMI_DB_PASSWORD}@db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      NODE_OPTIONS: "--max-old-space-size=256"
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_SENTRY_DSN=${VITE_SENTRY_DSN}
        - VITE_SENTRY_TRACES_SAMPLE_RATE=${VITE_SENTRY_TRACES_SAMPLE_RATE}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - umami
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
