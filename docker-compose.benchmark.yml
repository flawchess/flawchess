# Benchmark database — isolated from dev/prod
# Usage: docker compose -f docker-compose.benchmark.yml -p flawchess-benchmark up -d
services:
  db:
    image: postgres:18-alpine
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      # Tuned for a 32 GB dev machine running analytic benchmark queries.
      # Conservative on shared_buffers to leave headroom for IDE/other apps;
      # generous on work_mem since this DB only has 1-2 concurrent connections.
      - "-c"
      - "shared_buffers=4GB"
      - "-c"
      - "work_mem=256MB"
      - "-c"
      - "maintenance_work_mem=1GB"
      - "-c"
      - "effective_cache_size=16GB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "track_io_timing=on"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Pin PGDATA to the conventional path. The postgres:18 image defaults to
      # /var/lib/postgresql/18/docker, which would NOT be on the named volume
      # below, so data would silently live in the container's writable layer
      # and be lost on `docker compose down`. Keep this aligned with the volume
      # mount path.
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432"
    volumes:
      - benchmarkpgdata:/var/lib/postgresql/data
      - ./deploy/init-benchmark-db.sql:/docker-entrypoint-initdb.d/init-benchmark-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  benchmarkpgdata:
