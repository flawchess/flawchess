name: CI

"on":
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to production after tests pass"
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flawchess_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (ty)
        run: uv run ty check app/ tests/

      - name: Run pytest
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/flawchess_test
        run: uv run pytest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (eslint)
        run: npm run lint
        working-directory: frontend

      - name: Type check and build (tsc + vite)
        run: npm run build
        working-directory: frontend

      - name: Run tests (vitest)
        run: npm test
        working-directory: frontend

      - name: Dead code check (knip)
        run: npm run knip
        working-directory: frontend

  deploy:
    needs: test
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy == true
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/flawchess

            # Fail fast if working tree is dirty — never auto-resolve
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "ERROR: Working tree has uncommitted changes — aborting deploy"
              git status --short
              exit 1
            fi

            git pull origin main

            # Verify the expected commit arrived
            echo "Deployed commit: $(git log --oneline -1)"

            docker compose build --no-cache backend caddy
            docker compose up -d

      - name: Health check
        run: |
          for i in $(seq 1 36); do
            if curl -sf https://flawchess.com/api/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/36 failed, waiting 5s..."
            sleep 5
          done
          echo "Health check failed after 180s"
          exit 1
