# Local development database only
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  db:
    image: postgres:18-alpine
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Pin PGDATA to the conventional path. The postgres:18 image defaults to
      # /var/lib/postgresql/18/docker, which would NOT be on the named volume
      # below, so data would silently live in the container's writable layer
      # and be lost on `docker compose down`. Keep this aligned with the volume
      # mount path.
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - devpgdata:/var/lib/postgresql/data
      - ./deploy/init-dev-db.sql:/docker-entrypoint-initdb.d/init-dev-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  devpgdata:
